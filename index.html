<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Redirecting to GitHub...</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-N9K5BBVW1C"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-N9K5BBVW1C', { send_page_view: true });
    </script>
</head>

<body>
<p>
    Переходим на мой GitHub… Если не получилось,
    <a id="manual" href="https://github.com/VolkAuf">нажмите сюда</a>.
</p>

<script>
    const targetUrl = "https://github.com/VolkAuf";
    const eventName = "raf_github_redirect";

    function redirectNow() {
        window.location.replace(targetUrl);
    }

    function trackAndRedirect(source) {
        const fallbackTimer = setTimeout(redirectNow, 900);

        if (typeof gtag !== "function") {
            redirectNow();
            return;
        }

        gtag("event", eventName, {
            source,
            event_callback: function () {
                clearTimeout(fallbackTimer);
                redirectNow();
            },
            event_timeout: 800
        });
    }

    requestAnimationFrame(() => trackAndRedirect("auto"));

    document.getElementById("manual").addEventListener("click", (e) => {
        e.preventDefault();
        trackAndRedirect("manual");
    });
</script>
</body>
</html>
